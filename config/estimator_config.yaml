%YAML:1.0

verbosity: "INFO"

use_fej: true
integration: "analytical"
use_stereo: true
max_cameras: 2

calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: false
calib_imu_intrinsics: false
calib_imu_g_sensitivity: true

max_clones: 20
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 120
dt_slam_delay: 1

gravity_mag: 9.81

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

#try_zupt: false
#zupt_chi2_multipler: 0
#zupt_max_velocity: 0.1
#zupt_noise_multiplier: 10
#zupt_max_disparity: 0.5
#zupt_only_at_beginning: false

try_zupt: false         
zupt_chi2_multipler: 1.0   
zupt_max_velocity: 0.15     
zupt_noise_multiplier: 10
zupt_max_disparity: 1.0     
zupt_only_at_beginning: false
# ==================================================================
# INITIALIZATION - Key changes for ZED 2i
# ==================================================================

init_window_time: 2.0        # reduced from 3.0
init_imu_thresh: 10   # reduced from 1.5 ← fixes "no accel jerk detected"
init_max_disparity: 10.0
init_max_features: 80

init_dyn_use: true
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12

init_dyn_bias_g: [ 0.0, 0.0, 0.0 ]
init_dyn_bias_a: [ 0.0, 0.0, 0.0 ]

# ==================================================================
# RECORDING
# ==================================================================

record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# FEATURE TRACKING - Adjusted for ZED 2i 640x360
# ==================================================================

use_klt: true
num_pts: 450       # reduced from 350 for 640x360 resolution
fast_threshold: 8    # lowered for better detection on wide FOV
grid_x: 6
grid_y: 4
min_px_dist: 6         # reduced from 10 for lower resolution
knn_ratio: 0.80
track_frequency: 30.0     # match your camera frequency exactly
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "HISTOGRAM" # changed from HISTOGRAM, better for varying lighting

use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
# NOISE
# ==================================================================

up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"



